<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MyBatis Log 轉換成 SQL</title>
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    /* 設定 html 與 body 滿版 */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    /* 背景漸層，並以 flex 置中容器 */
    body {
      background: linear-gradient(135deg, #74ABE2, #5563DE);
      font-family: 'Roboto', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* 主要容器盡量放大，但保留內邊距與圓角 */
    .container {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      width: 95%;
      max-width: 1200px;
      height: 90vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }
    h2 {
      margin: 0;
      text-align: center;
      color: #333;
      margin-bottom: 10px;
    }
    p {
      color: #555;
      text-align: center;
      margin-bottom: 20px;
    }
    /* 將內容區改為上下排列 */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow: hidden;
    }
    .input-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    textarea {
      flex: 1;
      padding: 10px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 5px;
      resize: none;
      overflow: auto;
    }
    .result-pre {
      flex: 1;
      margin: 0;
      padding: 10px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 5px;
      overflow: auto;
      background: #f6f8fa;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .result-pre code {
      font-family: Consolas, monospace;
      font-size: 14px;
      padding: 0;
      background: transparent;
      white-space: pre-wrap;
      word-break: break-all;
    }
    /* 輸入區上方 header（標籤 + 清除按鈕） */
    .input-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .input-header span {
      font-size: 13px;
      color: #888;
    }
    /* 複製按鈕樣式 */
    .copy-container {
      text-align: center;
      margin-top: 10px;
    }
    button {
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      background-color: #5563DE;
      color: #fff;
      border-radius: 5px;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #444bb5;
    }
    .btn-clear {
      padding: 4px 10px;
      font-size: 12px;
      background-color: #e0e0e0;
      color: #555;
      border-radius: 4px;
    }
    .btn-clear:hover {
      background-color: #c8c8c8;
    }
    .btn-download {
      background-color: #fff;
      color: #5563DE;
      border: 1.5px solid #5563DE;
    }
    .btn-download:hover {
      background-color: #eef0fc;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>MyBatis Log 轉 SQL 工具</h2>
    <p>貼上 MyBatis log，輸入區在上方，結果即時顯示在下方。</p>
    <div class="content">
      <div class="input-wrap">
        <div class="input-header">
          <span>MyBatis Log 輸入</span>
          <button class="btn-clear" id="clearButton">清除</button>
        </div>
        <textarea id="logInput" placeholder="貼上 MyBatis log..." style="margin-top:6px;"></textarea>
      </div>
      <pre class="result-pre"><code id="result" class="language-sql">轉換後的 SQL 會顯示在這裡</code></pre>
    </div>
    <div class="copy-container">
      <button id="copyButton">複製 SQL</button>
      <button id="downloadSql" class="btn-download">下載 .sql</button>
      <button id="downloadTxt" class="btn-download">下載 .txt</button>
    </div>
  </div>

  <script>
    var PLACEHOLDER = "轉換後的 SQL 會顯示在這裡";

    function setResult(text) {
      var el = document.getElementById("result");
      el.removeAttribute("data-highlighted");
      el.textContent = text;
      hljs.highlightElement(el);
    }

    function getResultText() {
      return document.getElementById("result").textContent;
    }

    function formatSql(sql) {
      var keywords = ['SELECT', 'FROM', 'LEFT JOIN', 'RIGHT JOIN', 'INNER JOIN', 'JOIN',
                      'WHERE', 'AND', 'OR', 'ORDER BY', 'GROUP BY', 'HAVING', 'LIMIT',
                      'INSERT INTO', 'VALUES', 'UPDATE', 'SET', 'DELETE FROM'];
      var pattern = new RegExp('\\b(' + keywords.map(function(k) {
        return k.replace(/ /g, '\\s+');
      }).join('|') + ')\\b', 'gi');
      return sql.replace(pattern, function(match) {
        return '\n' + match.toUpperCase();
      }).trim();
    }

    function buildSql(sqlTemplate, paramsStr) {
      var paramsArr = paramsStr.split(/,(?![^\(]*\))/);
      var processedParams = paramsArr.map(function(item) {
        item = item.trim();
        var match = item.match(/^(.*?)\s*\((.*?)\)$/);
        var value = match ? match[1].trim() : item;
        if (match && match[2].toLowerCase() === "string") {
          value = value === "" ? "''" : (value.startsWith("'") && value.endsWith("'") ? value : "'" + value + "'");
        }
        return value;
      });
      var sql = sqlTemplate;
      processedParams.forEach(function(param) {
        sql = sql.replace("?", param);
      });
      return formatSql(sql);
    }

    function convertLog() {
      var logText = document.getElementById("logInput").value;

      // 收集所有 Preparing / Parameters 及其在 log 中的位置
      var events = [];
      var m;
      var prepRe = /Preparing:\s*(.*)/gi;
      var paramRe = /Parameters:\s*(.*)/gi;
      while ((m = prepRe.exec(logText)) !== null) {
        events.push({ type: 'preparing', index: m.index, value: m[1].trim() });
      }
      while ((m = paramRe.exec(logText)) !== null) {
        events.push({ type: 'parameters', index: m.index, value: m[1].trim() });
      }
      events.sort(function(a, b) { return a.index - b.index; });

      // 每個 Preparing 配對緊接在後的第一個 Parameters，其餘忽略
      var pairs = [];
      var pending = null;
      events.forEach(function(e) {
        if (e.type === 'preparing') {
          pending = e.value;
        } else if (e.type === 'parameters' && pending !== null) {
          pairs.push({ sql: pending, params: e.value });
          pending = null;
        }
      });

      if (pairs.length === 0) {
        setResult("找不到有效的 SQL 組合。");
        return;
      }

      var results = pairs.map(function(pair, i) {
        var header = pairs.length > 1 ? "-- [" + (i + 1) + "] --\n" : "";
        return header + buildSql(pair.sql, pair.params);
      });

      setResult(results.join("\n\n"));
    }

    document.getElementById("logInput").addEventListener("input", convertLog);

    // 頁面載入時初始化高亮（placeholder 文字）
    hljs.highlightElement(document.getElementById("result"));

    document.getElementById("copyButton").addEventListener("click", function() {
      var btn = document.getElementById("copyButton");
      var sqlText = getResultText();
      navigator.clipboard.writeText(sqlText).then(function() {
        btn.textContent = "已複製!";
        btn.style.backgroundColor = "#4caf50";
        setTimeout(function() {
          btn.textContent = "複製 SQL";
          btn.style.backgroundColor = "";
        }, 1500);
      }, function(err) {
        btn.textContent = "複製失敗";
        setTimeout(function() { btn.textContent = "複製 SQL"; }, 1500);
      });
    });

    function downloadFile(ext, mime) {
      var text = getResultText();
      if (!text || text === PLACEHOLDER) return;
      var blob = new Blob([text], { type: mime });
      var a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "query." + ext;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    document.getElementById("downloadSql").addEventListener("click", function() {
      downloadFile("sql", "text/plain");
    });
    document.getElementById("downloadTxt").addEventListener("click", function() {
      downloadFile("txt", "text/plain");
    });

    document.getElementById("clearButton").addEventListener("click", function() {
      document.getElementById("logInput").value = "";
      setResult(PLACEHOLDER);
    });
  </script>
</body>
</html>
