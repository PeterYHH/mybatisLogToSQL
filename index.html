<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MyBatis Log → SQL</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0f172a;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
      width: calc(100% - 48px);
      height: 92vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top accent bar */
    .app-header {
      padding: 20px 28px 16px;
      border-bottom: 1px solid #f1f5f9;
      background: #ffffff;
      border-top: 3px solid #3b82f6;
      border-radius: 14px 14px 0 0;
    }

    .app-header h2 {
      margin: 0 0 4px;
      font-size: 18px;
      font-weight: 600;
      color: #0f172a;
      letter-spacing: -0.3px;
    }

    .app-header p {
      margin: 0;
      font-size: 13px;
      color: #94a3b8;
    }

    /* Main content area */
    .content {
      flex: 1;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    /* Input section */
    .input-wrap {
      flex: none;
      width: 50%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 20px 16px 16px 28px;
    }

    /* Draggable divider */
    .divider {
      flex-shrink: 0;
      width: 8px;
      cursor: col-resize;
      position: relative;
      z-index: 1;
    }

    .divider::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 1px;
      background: #e2e8f0;
      transform: translateX(-50%);
      transition: background 0.15s, width 0.15s;
    }

    .divider::after {
      content: '···';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(90deg);
      color: #cbd5e1;
      font-size: 14px;
      letter-spacing: 1px;
      transition: color 0.15s;
    }

    .divider:hover::before,
    .divider.is-dragging::before {
      width: 2px;
      background: #3b82f6;
    }

    .divider:hover::after,
    .divider.is-dragging::after {
      color: #3b82f6;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    textarea {
      flex: 1;
      padding: 12px 14px;
      font-size: 13px;
      font-family: 'Menlo', 'Consolas', monospace;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      resize: none;
      overflow: auto;
      color: #334155;
      background: #f8fafc;
      line-height: 1.6;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    textarea:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      background: #ffffff;
    }

    textarea::placeholder {
      color: #cbd5e1;
    }

    /* Result section */
    .result-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 20px 28px 16px 16px;
    }

    .result-pre {
      flex: 1;
      margin: 0;
      padding: 12px 14px;
      border-radius: 8px;
      overflow: auto;
      background: #0d1117;
      border: 1.5px solid #21262d;
      white-space: pre-wrap;
      word-break: break-all;
      transition: background 0.15s, border-color 0.15s;
    }

    .result-pre code {
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 0;
      background: transparent;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .result-pre.is-error {
      background: #fff1f2;
      border-color: #fda4af;
    }

    .result-pre.is-error code {
      color: #e11d48;
      font-family: 'Inter', sans-serif;
    }

    .badge {
      display: none;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: #dbeafe;
      color: #1d4ed8;
      letter-spacing: 0;
      text-transform: none;
    }

    /* Bottom toolbar */
    .toolbar {
      padding: 14px 28px;
      border-top: 1px solid #f1f5f9;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #ffffff;
      border-radius: 0 0 14px 14px;
    }

    button {
      padding: 8px 16px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      cursor: pointer;
      border: none;
      border-radius: 7px;
      transition: background-color 0.15s, opacity 0.15s;
    }

    .btn-primary {
      background: #3b82f6;
      color: #ffffff;
    }

    .btn-primary:hover {
      background: #2563eb;
    }

    .btn-outline {
      background: #ffffff;
      color: #3b82f6;
      border: 1.5px solid #3b82f6;
    }

    .btn-outline:hover {
      background: #eff6ff;
    }

    .btn-ghost {
      background: transparent;
      color: #64748b;
      border: 1.5px solid #e2e8f0;
      margin-left: auto;
    }

    .btn-ghost:hover {
      background: #f8fafc;
      color: #334155;
    }

    kbd {
      font-size: 10px;
      font-family: inherit;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 3px;
      padding: 1px 4px;
      margin-left: 5px;
      color: #94a3b8;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="app-header">
      <h2>MyBatis Log → SQL</h2>
      <p>Paste your MyBatis log below. Converted SQL appears in real time.</p>
    </div>

    <div class="content">
      <div class="input-wrap">
        <div class="section-label">
          <span>Input</span>
        </div>
        <textarea id="logInput" placeholder="Paste MyBatis log here..."></textarea>
      </div>

      <div class="divider" id="divider"></div>
      <div class="result-wrap">
        <div class="section-label">
          <span>Result</span>
          <span class="badge" id="countBadge"></span>
        </div>
        <pre class="result-pre"><code id="result" class="language-sql">Converted SQL will appear here</code></pre>
      </div>
    </div>

    <div class="toolbar">
      <button class="btn-primary" id="copyButton">Copy SQL</button>
      <button class="btn-outline" id="downloadSql">Download .sql</button>
      <button class="btn-outline" id="downloadTxt">Download .txt</button>
      <button class="btn-ghost" id="clearButton">Clear <kbd id="shortcutHint"></kbd></button>
    </div>
  </div>

  <script>
    var PLACEHOLDER = "Converted SQL will appear here";

    function setResult(text, isError) {
      var el = document.getElementById("result");
      var pre = document.querySelector(".result-pre");
      el.removeAttribute("data-highlighted");
      el.textContent = text;
      if (isError) {
        pre.classList.add("is-error");
      } else {
        pre.classList.remove("is-error");
        hljs.highlightElement(el);
      }
    }

    function updateBadge(count) {
      var badge = document.getElementById("countBadge");
      if (count > 0) {
        badge.textContent = count + (count === 1 ? " statement" : " statements");
        badge.style.display = "inline-block";
      } else {
        badge.style.display = "none";
      }
    }

    function getResultText() {
      return document.getElementById("result").textContent;
    }

    function formatSql(sql) {
      var keywords = ['SELECT', 'FROM', 'LEFT JOIN', 'RIGHT JOIN', 'INNER JOIN', 'JOIN',
                      'WHERE', 'AND', 'OR', 'ORDER BY', 'GROUP BY', 'HAVING', 'LIMIT',
                      'INSERT INTO', 'VALUES', 'UPDATE', 'SET', 'DELETE FROM'];
      var pattern = new RegExp('\\b(' + keywords.map(function(k) {
        return k.replace(/ /g, '\\s+');
      }).join('|') + ')\\b', 'gi');
      return sql.replace(pattern, function(match) {
        return '\n' + match.toUpperCase();
      }).trim();
    }

    var QUOTED_TYPES = [
      'string', 'char', 'character',
      'date', 'time', 'timestamp',
      'localdate', 'localtime', 'localdatetime',
      'offsetdatetime', 'zoneddatetime'
    ];

    function buildSql(sqlTemplate, paramsStr) {
      var paramsArr = paramsStr.split(/,(?![^\(]*\))/);
      var processedParams = paramsArr.map(function(item) {
        item = item.trim();
        var match = item.match(/^(.*?)\s*\((.*?)\)$/);
        var value = match ? match[1].trim() : item;
        var type  = match ? match[2].toLowerCase() : '';

        // null（任何型別）→ NULL
        if (value.toLowerCase() === 'null') return 'NULL';

        // 需要加引號的型別（值內的單引號跳脫為 ''）
        if (match && QUOTED_TYPES.indexOf(type) !== -1) {
          if (value === '') return "''";
          if (value.startsWith("'") && value.endsWith("'")) return value;
          return "'" + value.replace(/'/g, "''") + "'";
        }

        return value;
      });
      var sql = sqlTemplate;
      processedParams.forEach(function(param) {
        sql = sql.replace("?", param);
      });
      return formatSql(sql);
    }

    function convertLog() {
      var logText = document.getElementById("logInput").value;

      var events = [];
      var m;
      var prepRe = /Preparing:\s*(.*)/gi;
      var paramRe = /Parameters:\s*(.*)/gi;
      while ((m = prepRe.exec(logText)) !== null) {
        events.push({ type: 'preparing', index: m.index, value: m[1].trim() });
      }
      while ((m = paramRe.exec(logText)) !== null) {
        events.push({ type: 'parameters', index: m.index, value: m[1].trim() });
      }
      events.sort(function(a, b) { return a.index - b.index; });

      var pairs = [];
      var pending = null;
      events.forEach(function(e) {
        if (e.type === 'preparing') {
          pending = e.value;
        } else if (e.type === 'parameters' && pending !== null) {
          pairs.push({ sql: pending, params: e.value });
          pending = null;
        }
      });

      if (pairs.length === 0) {
        setResult("No valid SQL pairs found.", true);
        updateBadge(0);
        return;
      }

      var results = pairs.map(function(pair, i) {
        var header = pairs.length > 1 ? "-- [" + (i + 1) + "] --\n" : "";
        return header + buildSql(pair.sql, pair.params);
      });

      setResult(results.join("\n\n"));
      updateBadge(pairs.length);
    }

    document.getElementById("logInput").addEventListener("input", convertLog);

    hljs.highlightElement(document.getElementById("result"));

    document.getElementById("copyButton").addEventListener("click", function() {
      var btn = document.getElementById("copyButton");
      var sqlText = getResultText();
      navigator.clipboard.writeText(sqlText).then(function() {
        btn.textContent = "Copied!";
        btn.style.background = "#16a34a";
        setTimeout(function() {
          btn.textContent = "Copy SQL";
          btn.style.background = "";
        }, 1500);
      }, function() {
        btn.textContent = "Failed";
        setTimeout(function() { btn.textContent = "Copy SQL"; }, 1500);
      });
    });

    function downloadFile(ext, mime) {
      var text = getResultText();
      if (!text || text === PLACEHOLDER) return;
      var blob = new Blob([text], { type: mime });
      var a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "query." + ext;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    document.getElementById("downloadSql").addEventListener("click", function() {
      downloadFile("sql", "text/plain");
    });
    document.getElementById("downloadTxt").addEventListener("click", function() {
      downloadFile("txt", "text/plain");
    });

    function doClear() {
      document.getElementById("logInput").value = "";
      setResult(PLACEHOLDER);
      updateBadge(0);
    }

    document.getElementById("clearButton").addEventListener("click", doClear);

    // 鍵盤快捷鍵：Cmd/Ctrl + K 清除
    var isMac = /Mac|iPhone|iPad/.test(navigator.platform);
    document.getElementById("shortcutHint").textContent = isMac ? "⌘K" : "Ctrl+K";
    document.addEventListener("keydown", function(e) {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") {
        e.preventDefault();
        doClear();
      }
    });

    // 拖曳分隔線
    (function() {
      var divider = document.getElementById("divider");
      var content = document.querySelector(".content");
      var inputWrap = document.querySelector(".input-wrap");
      var dragging = false;

      divider.addEventListener("mousedown", function(e) {
        dragging = true;
        divider.classList.add("is-dragging");
        document.body.style.cursor = "col-resize";
        document.body.style.userSelect = "none";
        e.preventDefault();
      });

      document.addEventListener("mousemove", function(e) {
        if (!dragging) return;
        var rect = content.getBoundingClientRect();
        var pct = (e.clientX - rect.left) / rect.width * 100;
        pct = Math.min(Math.max(pct, 20), 80);
        inputWrap.style.width = pct + "%";
      });

      document.addEventListener("mouseup", function() {
        if (!dragging) return;
        dragging = false;
        divider.classList.remove("is-dragging");
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
      });
    })();
  </script>
</body>
</html>
