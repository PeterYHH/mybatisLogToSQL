<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MyBatis Log → SQL</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }

    body {
      background: #0f172a;
      font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center;
    }

    .container {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5);
      width: calc(100% - 48px);
      height: 92vh;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .app-header {
      padding: 20px 28px 16px;
      border-bottom: 1px solid #f1f5f9;
      border-top: 3px solid #3b82f6;
      border-radius: 14px 14px 0 0;
    }
    .app-header h2 { margin: 0 0 4px; font-size: 18px; font-weight: 600; color: #0f172a; letter-spacing: -0.3px; }
    .app-header p  { margin: 0; font-size: 13px; color: #94a3b8; }

    /* ── Content ── */
    .content { flex: 1; display: flex; flex-direction: row; overflow: hidden; }

    .input-wrap {
      flex: none; width: 50%;
      display: flex; flex-direction: column;
      overflow: hidden; padding: 20px 16px 16px 28px;
    }

    .section-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.6px; text-transform: uppercase;
      color: #94a3b8; margin-bottom: 8px;
      display: flex; justify-content: space-between; align-items: center;
    }

    textarea {
      flex: 1; padding: 12px 14px;
      font-size: 13px; font-family: 'Menlo', 'Consolas', monospace;
      border: 1.5px solid #e2e8f0; border-radius: 8px;
      resize: none; overflow: auto;
      color: #334155; background: #f8fafc; line-height: 1.6;
      transition: border-color 0.15s, box-shadow 0.15s; outline: none;
    }
    textarea:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); background: #fff; }
    textarea::placeholder { color: #cbd5e1; }

    /* ── Draggable column divider ── */
    .divider {
      flex-shrink: 0; width: 8px;
      cursor: col-resize; position: relative; z-index: 1;
    }
    .divider::before {
      content: ''; position: absolute;
      left: 50%; top: 0; bottom: 0; width: 1px;
      background: #e2e8f0; transform: translateX(-50%);
      transition: background 0.15s, width 0.15s;
    }
    .divider::after {
      content: '···'; position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) rotate(90deg);
      color: #cbd5e1; font-size: 14px; letter-spacing: 1px;
      transition: color 0.15s;
    }
    .divider:hover::before, .divider.is-dragging::before { width: 2px; background: #3b82f6; }
    .divider:hover::after,  .divider.is-dragging::after  { color: #3b82f6; }

    /* ── Result ── */
    .result-wrap {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; padding: 20px 28px 16px 16px;
    }
    .result-pre {
      flex: 1; margin: 0; padding: 12px 14px;
      border-radius: 8px; overflow: auto;
      background: #0d1117; border: 1.5px solid #21262d;
      white-space: pre-wrap; word-break: break-all;
      transition: background 0.15s, border-color 0.15s;
    }
    .result-pre code {
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 13px; line-height: 1.6; padding: 0;
      background: transparent; white-space: pre-wrap; word-break: break-all;
    }
    .result-pre.is-error { background: #fff1f2; border-color: #fda4af; }
    .result-pre.is-error code { color: #e11d48; font-family: 'Inter', sans-serif; }

    .badge {
      display: none; font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 20px;
      background: #dbeafe; color: #1d4ed8; letter-spacing: 0; text-transform: none;
    }

    /* ── Toolbar ── */
    .toolbar {
      padding: 12px 28px;
      border-top: 1px solid #f1f5f9;
      display: flex; align-items: center; gap: 8px;
      background: #fff; border-radius: 0 0 14px 14px;
      position: relative;
    }
    button {
      padding: 7px 14px; font-size: 13px;
      font-family: 'Inter', sans-serif; font-weight: 500;
      cursor: pointer; border: none; border-radius: 7px;
      transition: background-color 0.15s;
    }
    .btn-primary { background: #3b82f6; color: #fff; }
    .btn-primary:hover { background: #2563eb; }
    .btn-outline { background: #fff; color: #3b82f6; border: 1.5px solid #3b82f6; }
    .btn-outline:hover { background: #eff6ff; }
    .btn-ghost { background: transparent; color: #64748b; border: 1.5px solid #e2e8f0; margin-left: auto; }
    .btn-ghost:hover { background: #f8fafc; color: #334155; }

    kbd {
      font-size: 10px; font-family: inherit;
      background: #f1f5f9; border: 1px solid #e2e8f0;
      border-radius: 3px; padding: 1px 4px;
      margin-left: 5px; color: #94a3b8; vertical-align: middle;
    }
    .toolbar-sep { width: 1px; height: 20px; background: #e2e8f0; margin: 0 2px; flex-shrink: 0; }

    /* ── Font controls ── */
    .font-controls {
      display: flex; align-items: center; gap: 2px;
      background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 7px; padding: 2px;
    }
    .btn-icon {
      padding: 3px 7px; font-size: 12px; font-weight: 600;
      background: transparent; color: #64748b;
      border: none; border-radius: 5px; cursor: pointer;
      font-family: 'Inter', sans-serif; transition: background 0.1s, color 0.1s;
    }
    .btn-icon:hover { background: #e2e8f0; color: #334155; }
    .font-size-display { font-size: 11px; color: #64748b; min-width: 30px; text-align: center; user-select: none; }
    .btn-reset { color: #94a3b8; }
    .btn-reset:hover { color: #3b82f6; background: #eff6ff; }

    /* ── History dropdown ── */
    .history-wrap { position: relative; }
    .history-dropdown {
      display: none; flex-direction: column;
      position: absolute; bottom: calc(100% + 10px); right: 0;
      width: 380px; max-height: 320px;
      background: #fff; border: 1px solid #e2e8f0;
      border-radius: 10px;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
      overflow: hidden; z-index: 100;
    }
    .history-dropdown.is-open { display: flex; }

    .history-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; border-bottom: 1px solid #f1f5f9;
      font-size: 11px; font-weight: 600;
      color: #94a3b8; letter-spacing: 0.6px; text-transform: uppercase;
      flex-shrink: 0;
    }
    .history-header button {
      font-size: 11px; padding: 2px 8px;
      background: transparent; color: #94a3b8;
      border: 1px solid #e2e8f0; border-radius: 4px;
      text-transform: none; letter-spacing: 0; font-weight: 400;
    }
    .history-header button:hover { color: #e11d48; border-color: #fda4af; }

    .history-list { overflow-y: auto; flex: 1; }
    .history-empty { padding: 24px; text-align: center; color: #94a3b8; font-size: 13px; }

    .history-item {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 14px; cursor: pointer;
      border-bottom: 1px solid #f8fafc;
      transition: background 0.1s;
      user-select: none;
    }
    .history-item:hover { background: #f8fafc; }
    .history-item:last-child { border-bottom: none; }
    .history-item.is-pinned { background: #fefce8; }
    .history-item.is-pinned:hover { background: #fef9c3; }
    .history-item.is-dragging { opacity: 0.35; }
    .history-item.drag-over-top    { box-shadow: inset 0 2px 0 #3b82f6; }
    .history-item.drag-over-bottom { box-shadow: inset 0 -2px 0 #3b82f6; }

    .history-drag-handle {
      color: #d1d5db; font-size: 13px; cursor: grab;
      flex-shrink: 0; line-height: 1; padding: 0 1px;
      transition: color 0.1s;
    }
    .history-drag-handle:hover { color: #94a3b8; }

    .history-item-body { flex: 1; min-width: 0; }
    .history-item-time { font-size: 11px; color: #94a3b8; margin-bottom: 2px; }
    .history-item-preview {
      font-size: 12px; font-family: 'Menlo', 'Consolas', monospace;
      color: #334155; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .history-item-name {
      font-size: 12px; font-weight: 500;
      color: #3b82f6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .history-item-badge {
      font-size: 10px; background: #f1f5f9; color: #64748b;
      padding: 2px 7px; border-radius: 10px; white-space: nowrap; flex-shrink: 0;
    }
    .history-item-pin {
      font-size: 13px; flex-shrink: 0; cursor: pointer;
      padding: 0 2px; color: #d1d5db; transition: color 0.1s;
    }
    .history-item-pin:hover { color: #f59e0b; }
    .history-item.is-pinned .history-item-pin { color: #f59e0b; }

    .history-item-edit {
      color: #d1d5db; font-size: 13px; flex-shrink: 0;
      padding: 0 2px; cursor: pointer; transition: color 0.1s;
    }
    .history-item-edit:hover { color: #3b82f6; }
    .history-item-del {
      color: #d1d5db; font-size: 15px; flex-shrink: 0;
      padding: 0 2px; line-height: 1; transition: color 0.1s;
    }
    .history-item-del:hover { color: #e11d48; }

    .history-item-input {
      width: 100%; font-size: 12px; font-family: 'Inter', sans-serif;
      border: 1.5px solid #3b82f6; border-radius: 4px;
      padding: 2px 6px; outline: none; color: #334155; background: #fff;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }

    /* ── Hover preview popup ── */
    .history-preview-popup {
      display: none;
      position: fixed;
      background: #0d1117;
      border: 1.5px solid #21262d;
      border-radius: 10px;
      padding: 12px 14px;
      width: 340px; max-height: 280px;
      overflow: auto;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 12px; line-height: 1.6;
      color: #e6edf3;
      white-space: pre-wrap; word-break: break-all;
      z-index: 500;
      pointer-events: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="app-header">
      <h2>MyBatis Log → SQL</h2>
      <p>Paste your MyBatis log below. Converted SQL appears in real time.</p>
    </div>

    <div class="content">
      <div class="input-wrap">
        <div class="section-label"><span>Input</span></div>
        <textarea id="logInput" placeholder="Paste MyBatis log here..."></textarea>
      </div>

      <div class="divider" id="divider"></div>

      <div class="result-wrap">
        <div class="section-label">
          <span>Result</span>
          <span class="badge" id="countBadge"></span>
        </div>
        <pre class="result-pre"><code id="result" class="language-sql">Converted SQL will appear here</code></pre>
      </div>
    </div>

    <div class="toolbar">
      <button class="btn-primary" id="copyButton">Copy SQL</button>
      <button class="btn-outline" id="downloadSql">Download .sql</button>
      <button class="btn-outline" id="downloadTxt">Download .txt</button>

      <span class="toolbar-sep"></span>

      <div class="font-controls">
        <button class="btn-icon" id="fontDecrease">A−</button>
        <span class="font-size-display" id="fontSizeDisplay">13px</span>
        <button class="btn-icon" id="fontIncrease">A+</button>
        <button class="btn-icon btn-reset" id="resetLayout" title="Reset font size and divider to defaults">↺</button>
      </div>

      <div class="history-wrap">
        <button class="btn-outline" id="historyBtn">History</button>
        <div class="history-dropdown" id="historyDropdown">
          <div class="history-header">
            <span>Recent</span>
            <button id="clearHistoryBtn">Clear all</button>
          </div>
          <div class="history-list" id="historyList"></div>
        </div>
      </div>

      <button class="btn-ghost" id="clearButton">Clear <kbd id="shortcutHint"></kbd></button>
    </div>
  </div>

  <!-- Hover preview popup (outside dropdown to avoid clipping) -->
  <div class="history-preview-popup" id="historyPreview"></div>

  <script>
    /* ── Constants ── */
    var PLACEHOLDER         = "Converted SQL will appear here";
    var DEFAULT_FONT_SIZE   = 13;
    var DEFAULT_DIVIDER_PCT = 50;
    var MAX_HISTORY         = 10;
    var currentFontSize     = DEFAULT_FONT_SIZE;

    /* ── Result helpers ── */
    function setResult(text, isError) {
      var el  = document.getElementById("result");
      var pre = document.querySelector(".result-pre");
      el.removeAttribute("data-highlighted");
      el.textContent = text;
      if (isError) { pre.classList.add("is-error"); }
      else { pre.classList.remove("is-error"); hljs.highlightElement(el); }
    }

    function getResultText() { return document.getElementById("result").textContent; }

    function updateBadge(count) {
      var badge = document.getElementById("countBadge");
      if (count > 0) {
        badge.textContent = count + (count === 1 ? " statement" : " statements");
        badge.style.display = "inline-block";
      } else { badge.style.display = "none"; }
    }

    /* ── SQL helpers ── */
    function formatSql(sql) {
      var kw = ['SELECT','FROM','LEFT JOIN','RIGHT JOIN','INNER JOIN','JOIN',
                'WHERE','AND','OR','ORDER BY','GROUP BY','HAVING','LIMIT',
                'INSERT INTO','VALUES','UPDATE','SET','DELETE FROM'];
      var pat = new RegExp('\\b(' + kw.map(function(k){ return k.replace(/ /g,'\\s+'); }).join('|') + ')\\b', 'gi');
      return sql.replace(pat, function(m){ return '\n' + m.toUpperCase(); }).trim();
    }

    var QUOTED_TYPES = [
      'string','char','character',
      'date','time','timestamp',
      'localdate','localtime','localdatetime',
      'offsetdatetime','zoneddatetime'
    ];

    function buildSql(sqlTemplate, paramsStr) {
      var paramsArr = paramsStr.split(/,(?![^\(]*\))/);
      var processed = paramsArr.map(function(item) {
        item = item.trim();
        var m = item.match(/^(.*?)\s*\((.*?)\)$/);
        var value = m ? m[1].trim() : item;
        var type  = m ? m[2].toLowerCase() : '';
        if (value.toLowerCase() === 'null') return 'NULL';
        if (m && QUOTED_TYPES.indexOf(type) !== -1) {
          if (value === '') return "''";
          if (value.startsWith("'") && value.endsWith("'")) return value;
          return "'" + value.replace(/'/g, "''") + "'";
        }
        return value;
      });
      var sql = sqlTemplate;
      processed.forEach(function(p){ sql = sql.replace("?", p); });
      return formatSql(sql);
    }

    /* ── Conversion ── */
    function convertLog() {
      var logText = document.getElementById("logInput").value;
      var events = [], m;
      var prepRe  = /Preparing:\s*(.*)/gi;
      var paramRe = /Parameters:\s*(.*)/gi;
      while ((m = prepRe.exec(logText))  !== null) events.push({ type:'preparing',  index:m.index, value:m[1].trim() });
      while ((m = paramRe.exec(logText)) !== null) events.push({ type:'parameters', index:m.index, value:m[1].trim() });
      events.sort(function(a,b){ return a.index - b.index; });

      var pairs = [], pending = null;
      events.forEach(function(e) {
        if (e.type === 'preparing') { pending = e.value; }
        else if (e.type === 'parameters' && pending !== null) { pairs.push({ sql:pending, params:e.value }); pending = null; }
      });

      if (pairs.length === 0) { setResult("No valid SQL pairs found.", true); updateBadge(0); return; }

      var results = pairs.map(function(pair, i) {
        return (pairs.length > 1 ? "-- [" + (i+1) + "] --\n" : "") + buildSql(pair.sql, pair.params);
      });

      var joined = results.join("\n\n");
      setResult(joined);
      updateBadge(pairs.length);
      saveToHistory(joined, pairs.length);
    }

    document.getElementById("logInput").addEventListener("input", convertLog);
    hljs.highlightElement(document.getElementById("result"));

    /* ── Copy / Download / Clear ── */
    document.getElementById("copyButton").addEventListener("click", function() {
      var btn = this, text = getResultText();
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = "Copied!"; btn.style.background = "#16a34a";
        setTimeout(function(){ btn.textContent = "Copy SQL"; btn.style.background = ""; }, 1500);
      }, function() {
        btn.textContent = "Failed";
        setTimeout(function(){ btn.textContent = "Copy SQL"; }, 1500);
      });
    });

    function downloadFile(ext, mime) {
      var text = getResultText();
      if (!text || text === PLACEHOLDER) return;
      var a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([text], { type: mime }));
      a.download = "query." + ext; a.click();
      URL.revokeObjectURL(a.href);
    }
    document.getElementById("downloadSql").addEventListener("click", function(){ downloadFile("sql","text/plain"); });
    document.getElementById("downloadTxt").addEventListener("click", function(){ downloadFile("txt","text/plain"); });

    function doClear() {
      document.getElementById("logInput").value = "";
      setResult(PLACEHOLDER); updateBadge(0);
    }
    document.getElementById("clearButton").addEventListener("click", doClear);

    /* ── Keyboard shortcut ── */
    var isMac = /Mac|iPhone|iPad/.test(navigator.platform);
    document.getElementById("shortcutHint").textContent = isMac ? "⌘K" : "Ctrl+K";
    document.addEventListener("keydown", function(e) {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") { e.preventDefault(); doClear(); }
    });

    /* ── Font size ── */
    function applyFontSize(size) {
      currentFontSize = size;
      document.querySelector(".result-pre code").style.fontSize = size + "px";
      document.getElementById("fontSizeDisplay").textContent = size + "px";
    }
    function saveFontSize(size) {
      size = Math.min(Math.max(size, 10), 20);
      applyFontSize(size);
      localStorage.setItem("mybatis_font_size", size);
    }
    document.getElementById("fontDecrease").addEventListener("click", function(){ saveFontSize(currentFontSize - 1); });
    document.getElementById("fontIncrease").addEventListener("click", function(){ saveFontSize(currentFontSize + 1); });

    /* ── Reset layout ── */
    function applyDividerPct(pct) {
      document.querySelector(".input-wrap").style.width = pct + "%";
    }
    document.getElementById("resetLayout").addEventListener("click", function() {
      saveFontSize(DEFAULT_FONT_SIZE);
      applyDividerPct(DEFAULT_DIVIDER_PCT);
      localStorage.removeItem("mybatis_divider_pct");
      localStorage.removeItem("mybatis_font_size");
      var btn = this;
      btn.style.transition = "transform 0.4s";
      btn.style.transform  = "rotate(360deg)";
      setTimeout(function(){ btn.style.transform = ""; btn.style.transition = ""; }, 420);
    });

    /* ── Column divider drag ── */
    (function() {
      var divider   = document.getElementById("divider");
      var content   = document.querySelector(".content");
      var inputWrap = document.querySelector(".input-wrap");
      var dragging  = false, lastPct = DEFAULT_DIVIDER_PCT;

      divider.addEventListener("mousedown", function(e) {
        dragging = true;
        divider.classList.add("is-dragging");
        document.body.style.cursor = "col-resize";
        document.body.style.userSelect = "none";
        e.preventDefault();
      });
      document.addEventListener("mousemove", function(e) {
        if (!dragging) return;
        var rect = content.getBoundingClientRect();
        var pct  = (e.clientX - rect.left) / rect.width * 100;
        pct = Math.min(Math.max(pct, 20), 80);
        lastPct = pct;
        inputWrap.style.width = pct + "%";
      });
      document.addEventListener("mouseup", function() {
        if (!dragging) return;
        dragging = false;
        divider.classList.remove("is-dragging");
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
        localStorage.setItem("mybatis_divider_pct", lastPct);
      });
    })();

    /* ── History ── */
    function getHistory() {
      try { return JSON.parse(localStorage.getItem("mybatis_history") || "[]"); }
      catch(e) { return []; }
    }

    function saveToHistory(sqlText, count) {
      var history = getHistory();
      history.unshift({ ts: Date.now(), sql: sqlText, count: count, pinned: false, name: null });
      // evict last unpinned if over limit
      while (history.length > MAX_HISTORY) {
        var evict = -1;
        for (var i = history.length - 1; i >= 0; i--) {
          if (!history[i].pinned) { evict = i; break; }
        }
        if (evict === -1) break;
        history.splice(evict, 1);
      }
      localStorage.setItem("mybatis_history", JSON.stringify(history));
      renderHistory();
    }

    function togglePin(idx) {
      var history = getHistory();
      if (!history[idx]) return;
      history[idx].pinned = !history[idx].pinned;
      localStorage.setItem("mybatis_history", JSON.stringify(history));
      renderHistory();
    }

    function formatTimeAgo(ts) {
      var min = Math.floor((Date.now() - ts) / 60000);
      if (min < 1)  return "just now";
      if (min < 60) return min + " min ago";
      var hr = Math.floor(min / 60);
      if (hr < 24)  return hr + " hr ago";
      var day = Math.floor(hr / 24);
      return day + " day" + (day > 1 ? "s" : "") + " ago";
    }

    function escapeHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    /* ── Hover preview ── */
    var previewEl = document.getElementById("historyPreview");

    function showPreview(item, hoverEl) {
      var highlighted = hljs.highlight(item.sql, { language: 'sql' }).value;
      previewEl.innerHTML = '<code style="background:transparent;padding:0;font-family:\'Menlo\',\'Consolas\',monospace;font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-all;">' + highlighted + '</code>';
      var dropdownRect = document.getElementById("historyDropdown").getBoundingClientRect();
      var hoverRect    = hoverEl.getBoundingClientRect();
      var popupWidth   = 340;
      var left = dropdownRect.left - popupWidth - 10;
      var top  = hoverRect.top;
      if (left < 8) left = dropdownRect.right + 10;
      if (top + 280 > window.innerHeight) top = window.innerHeight - 290;
      previewEl.style.left    = left + "px";
      previewEl.style.top     = top + "px";
      previewEl.style.display = "block";
    }
    function hidePreview() { previewEl.style.display = "none"; }

    /* ── Drag & drop for history items ── */
    var draggedIdx = null;

    /* ── Render history ── */
    function renderHistory() {
      var history = getHistory();
      var list = document.getElementById("historyList");
      if (history.length === 0) {
        list.innerHTML = '<div class="history-empty">No conversions yet</div>';
        return;
      }

      list.innerHTML = history.map(function(item, i) {
        var preview = item.sql.split("\n")[0].trim();
        if (preview.length > 50) preview = preview.substring(0, 50) + "…";
        var countLabel = item.count === 1 ? "1 stmt" : item.count + " stmts";
        var labelHtml  = item.name
          ? '<div class="history-item-name">' + escapeHtml(item.name) + '</div>'
          : '<div class="history-item-preview">' + escapeHtml(preview) + '</div>';
        var pinnedClass = item.pinned ? " is-pinned" : "";
        var pinIcon     = item.pinned ? "★" : "☆";
        return (
          '<div class="history-item' + pinnedClass + '" data-index="' + i + '" draggable="true">' +
            '<span class="history-drag-handle" title="Drag to reorder">⠿</span>' +
            '<div class="history-item-body">' +
              '<div class="history-item-time">' + formatTimeAgo(item.ts) + '</div>' +
              labelHtml +
            '</div>' +
            '<span class="history-item-badge">' + countLabel + '</span>' +
            '<span class="history-item-pin"  data-pin="'  + i + '" title="' + (item.pinned ? "Unpin" : "Pin") + '">' + pinIcon + '</span>' +
            '<span class="history-item-edit" data-edit="' + i + '" title="Rename">✎</span>' +
            '<span class="history-item-del"  data-del="'  + i + '">×</span>' +
          '</div>'
        );
      }).join("");

      list.querySelectorAll(".history-item").forEach(function(el) {
        var idx = parseInt(el.dataset.index);

        /* click → restore */
        el.addEventListener("click", function(e) {
          var t = e.target;
          if (t.dataset.pin !== undefined || t.dataset.edit !== undefined || t.dataset.del !== undefined) return;
          if (t.classList.contains("history-drag-handle")) return;
          var item = getHistory()[idx];
          if (!item) return;
          setResult(item.sql);
          updateBadge(item.count);
          closeHistory();
        });

        /* hover preview */
        el.addEventListener("mouseenter", function() {
          var item = getHistory()[idx];
          if (item) showPreview(item, el);
        });
        el.addEventListener("mouseleave", hidePreview);

        /* pin */
        el.querySelector("[data-pin]").addEventListener("click", function(e) {
          e.stopPropagation(); hidePreview(); togglePin(idx);
        });

        /* rename */
        el.querySelector("[data-edit]").addEventListener("click", function(e) {
          e.stopPropagation(); hidePreview();
          startRename(el, idx);
        });

        /* delete */
        el.querySelector("[data-del]").addEventListener("click", function(e) {
          e.stopPropagation(); hidePreview();
          var h = getHistory(); h.splice(idx, 1);
          localStorage.setItem("mybatis_history", JSON.stringify(h));
          renderHistory();
        });

        /* drag & drop */
        el.addEventListener("dragstart", function(e) {
          draggedIdx = idx;
          e.dataTransfer.effectAllowed = "move";
          setTimeout(function(){ el.classList.add("is-dragging"); }, 0);
          hidePreview();
        });
        el.addEventListener("dragend", function() {
          draggedIdx = null;
          el.classList.remove("is-dragging");
          list.querySelectorAll(".history-item").forEach(function(x){
            x.classList.remove("drag-over-top", "drag-over-bottom");
          });
        });
        el.addEventListener("dragover", function(e) {
          e.preventDefault();
          if (draggedIdx === null || draggedIdx === idx) return;
          e.dataTransfer.dropEffect = "move";
          list.querySelectorAll(".history-item").forEach(function(x){
            x.classList.remove("drag-over-top", "drag-over-bottom");
          });
          var rect = el.getBoundingClientRect();
          el.classList.add(e.clientY < rect.top + rect.height / 2 ? "drag-over-top" : "drag-over-bottom");
        });
        el.addEventListener("dragleave", function() {
          el.classList.remove("drag-over-top", "drag-over-bottom");
        });
        el.addEventListener("drop", function(e) {
          e.preventDefault();
          if (draggedIdx === null || draggedIdx === idx) return;
          var rect = el.getBoundingClientRect();
          var before = e.clientY < rect.top + rect.height / 2;
          var h = getHistory();
          var item = h.splice(draggedIdx, 1)[0];
          var targetIdx = draggedIdx < idx ? idx - 1 : idx;
          h.splice(before ? targetIdx : targetIdx + 1, 0, item);
          localStorage.setItem("mybatis_history", JSON.stringify(h));
          draggedIdx = null;
          renderHistory();
        });
      });
    }

    /* ── Rename ── */
    function startRename(itemEl, idx) {
      var labelEl = itemEl.querySelector(".history-item-name, .history-item-preview");
      var h = getHistory();
      var current = h[idx] ? (h[idx].name || "") : "";
      var input = document.createElement("input");
      input.className = "history-item-input";
      input.value = current;
      input.placeholder = "Enter a name…";
      labelEl.replaceWith(input);
      input.focus(); input.select();

      var saved = false;
      function save() {
        if (saved) return; saved = true;
        var history = getHistory();
        if (history[idx]) {
          history[idx].name = input.value.trim() || null;
          localStorage.setItem("mybatis_history", JSON.stringify(history));
        }
        renderHistory();
      }
      input.addEventListener("keydown", function(e) {
        if (e.key === "Enter")  { e.preventDefault(); save(); }
        if (e.key === "Escape") { saved = true; renderHistory(); }
        e.stopPropagation();
      });
      input.addEventListener("blur", save);
      input.addEventListener("click", function(e){ e.stopPropagation(); });
    }

    /* ── History dropdown toggle ── */
    var historyOpen = false;
    function closeHistory() {
      document.getElementById("historyDropdown").classList.remove("is-open");
      historyOpen = false;
      hidePreview();
    }
    document.getElementById("historyBtn").addEventListener("click", function(e) {
      historyOpen = !historyOpen;
      document.getElementById("historyDropdown").classList.toggle("is-open", historyOpen);
      if (historyOpen) renderHistory();
      e.stopPropagation();
    });
    document.addEventListener("click", function() { if (historyOpen) closeHistory(); });
    document.getElementById("historyDropdown").addEventListener("click", function(e){ e.stopPropagation(); });
    document.getElementById("clearHistoryBtn").addEventListener("click", function() {
      localStorage.removeItem("mybatis_history"); renderHistory();
    });

    /* ── Load saved settings ── */
    (function() {
      var savedFont = parseInt(localStorage.getItem("mybatis_font_size"));
      if (savedFont >= 10 && savedFont <= 20) applyFontSize(savedFont);
      var savedPct = parseFloat(localStorage.getItem("mybatis_divider_pct"));
      if (savedPct >= 20 && savedPct <= 80) {
        document.querySelector(".input-wrap").style.width = savedPct + "%";
      }
    })();
  </script>
</body>
</html>
