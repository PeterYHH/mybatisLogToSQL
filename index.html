<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MyBatis Log 轉換成 SQL</title>
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,500&display=swap" rel="stylesheet">
  <style>
    /* 設定 html 與 body 滿版 */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    /* 背景漸層，並以 flex 置中容器 */
    body {
      background: linear-gradient(135deg, #74ABE2, #5563DE);
      font-family: 'Roboto', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* 主要容器盡量放大，但保留內邊距與圓角 */
    .container {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      width: 95%;
      max-width: 1200px;
      height: 90vh;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }
    h2 {
      margin: 0;
      text-align: center;
      color: #333;
      margin-bottom: 10px;
    }
    p {
      color: #555;
      text-align: center;
      margin-bottom: 20px;
    }
    /* 將內容區改為上下排列 */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow: hidden;
    }
    .input-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    textarea, .result {
      flex: 1;
      padding: 10px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 5px;
      resize: none;
      overflow: auto;
    }
    .result {
      background: #f9f9f9;
      font-family: Consolas, monospace;
      color: #333;
      white-space: pre-wrap;
    }
    /* 輸入區上方 header（標籤 + 清除按鈕） */
    .input-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .input-header span {
      font-size: 13px;
      color: #888;
    }
    /* 複製按鈕樣式 */
    .copy-container {
      text-align: center;
      margin-top: 10px;
    }
    button {
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      background-color: #5563DE;
      color: #fff;
      border-radius: 5px;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #444bb5;
    }
    .btn-clear {
      padding: 4px 10px;
      font-size: 12px;
      background-color: #e0e0e0;
      color: #555;
      border-radius: 4px;
    }
    .btn-clear:hover {
      background-color: #c8c8c8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>MyBatis Log 轉 SQL 工具</h2>
    <p>貼上 MyBatis log，輸入區在上方，結果即時顯示在下方。</p>
    <div class="content">
      <div class="input-wrap">
        <div class="input-header">
          <span>MyBatis Log 輸入</span>
          <button class="btn-clear" id="clearButton">清除</button>
        </div>
        <textarea id="logInput" placeholder="貼上 MyBatis log..." style="margin-top:6px;"></textarea>
      </div>
      <div class="result" id="result">轉換後的 SQL 會顯示在這裡</div>
    </div>
    <div class="copy-container">
      <button id="copyButton">複製 SQL</button>
    </div>
  </div>

  <script>
    function formatSql(sql) {
      var keywords = ['SELECT', 'FROM', 'LEFT JOIN', 'RIGHT JOIN', 'INNER JOIN', 'JOIN',
                      'WHERE', 'AND', 'OR', 'ORDER BY', 'GROUP BY', 'HAVING', 'LIMIT',
                      'INSERT INTO', 'VALUES', 'UPDATE', 'SET', 'DELETE FROM'];
      var pattern = new RegExp('\\b(' + keywords.map(function(k) {
        return k.replace(/ /g, '\\s+');
      }).join('|') + ')\\b', 'gi');
      return sql.replace(pattern, function(match) {
        return '\n' + match.toUpperCase();
      }).trim();
    }

    function buildSql(sqlTemplate, paramsStr) {
      var paramsArr = paramsStr.split(/,(?![^\(]*\))/);
      var processedParams = paramsArr.map(function(item) {
        item = item.trim();
        var match = item.match(/^(.*?)\s*\((.*?)\)$/);
        var value = match ? match[1].trim() : item;
        if (match && match[2].toLowerCase() === "string") {
          value = value === "" ? "''" : (value.startsWith("'") && value.endsWith("'") ? value : "'" + value + "'");
        }
        return value;
      });
      var sql = sqlTemplate;
      processedParams.forEach(function(param) {
        sql = sql.replace("?", param);
      });
      return formatSql(sql);
    }

    function convertLog() {
      var logText = document.getElementById("logInput").value;

      var preparingMatches = [...logText.matchAll(/Preparing:\s*(.*)/gi)];
      var parametersMatches = [...logText.matchAll(/Parameters:\s*(.*)/gi)];

      if (preparingMatches.length === 0) {
        document.getElementById("result").innerText = "找不到 Preparing 的 SQL 語句。";
        return;
      }
      if (parametersMatches.length === 0) {
        document.getElementById("result").innerText = "找不到 Parameters 資料。";
        return;
      }

      var count = Math.min(preparingMatches.length, parametersMatches.length);
      var results = [];
      for (var i = 0; i < count; i++) {
        var header = count > 1 ? "-- [" + (i + 1) + "] --\n" : "";
        results.push(header + buildSql(preparingMatches[i][1].trim(), parametersMatches[i][1].trim()));
      }

      document.getElementById("result").innerText = results.join("\n\n");
    }

    document.getElementById("logInput").addEventListener("input", convertLog);

    document.getElementById("copyButton").addEventListener("click", function() {
      var btn = document.getElementById("copyButton");
      var sqlText = document.getElementById("result").innerText;
      navigator.clipboard.writeText(sqlText).then(function() {
        btn.textContent = "已複製!";
        btn.style.backgroundColor = "#4caf50";
        setTimeout(function() {
          btn.textContent = "複製 SQL";
          btn.style.backgroundColor = "";
        }, 1500);
      }, function(err) {
        btn.textContent = "複製失敗";
        setTimeout(function() { btn.textContent = "複製 SQL"; }, 1500);
      });
    });

    document.getElementById("clearButton").addEventListener("click", function() {
      document.getElementById("logInput").value = "";
      document.getElementById("result").innerText = "轉換後的 SQL 會顯示在這裡";
    });
  </script>
</body>
</html>
